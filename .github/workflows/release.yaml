on:
  push:
    tags:
      - "v*.*.*"

name: Release

env:
  FLUTTER_VERSION: 3.38.9
  XCODE_VERSION: 16.0

jobs:
  # --- SENTRY: Create release before parallel builds to avoid check-then-create race ---
  sentry-create-release:
    name: Create Sentry Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Sentry Release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION="2.42.2" bash

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAG_VERSION="${TAG_VERSION%%-rc*}"
          PUBSPEC_VERSION=$(awk '/^version:/{split($2,a,"+"); print a[1]; exit}' pubspec.yaml)
          PUBSPEC_VERSION="${PUBSPEC_VERSION%%-rc*}"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::warning::Tag version ($TAG_VERSION) does not match pubspec version ($PUBSPEC_VERSION). Skipping Sentry release creation."
            exit 0
          fi

          echo "Creating Sentry release: $PUBSPEC_VERSION"
          sentry-cli releases new "$PUBSPEC_VERSION"

  release:
    name: Release
    # Run even if sentry-create-release fails — Sentry upload is optional
    if: always() && startsWith(github.ref, 'refs/tags/v')
    needs: [sentry-create-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: android
            runner: ubuntu-latest
          - os: ios
            runner: macos-14 # Use macos-14 runners because Xcode 16 only exists on macOS 14+.
      fail-fast: false

    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true
          cache-key: deps-${{ hashFiles('**/pubspec.lock') }} # optional, change this to force refresh cache
          cache-path: ${{ runner.tool_cache }}/flutter # optional, change this to specify the cache path

      - name: Setup Firebase env
        env:
          FIREBASE_ENV: ${{ secrets.FIREBASE_ENV }}
        run: ./scripts/setup-firebase.sh

      - name: Setup Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ${{ matrix.os }}

      - name: Setup Java
        if: matrix.os == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Select Xcode version
        if: matrix.os == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Android environment
        if: matrix.os == 'android'
        env:
          PLAY_STORE_UPLOAD_KEY_BASE64: ${{ secrets.PLAY_STORE_UPLOAD_KEY_BASE64 }}
          PLAY_STORE_KEY_INFO_BASE64: ${{ secrets.PLAY_STORE_KEY_INFO_BASE64 }}
        run: ../scripts/setup-android.sh
        working-directory: ${{ matrix.os }}

      - name: Setup iOS environment
        if: matrix.os == 'ios'
        run: ../scripts/setup-ios.sh
        working-directory: ${{ matrix.os }}

      - name: Run prebuild
        run: ./scripts/prebuild.sh

      - name: Build and deploy
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_CERTIFICATES_SSH_KEY: ${{ secrets.APPLE_CERTIFICATES_SSH_KEY }}
          PLAY_STORE_CONFIG_JSON: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
        run: ../scripts/build-release.sh
        working-directory: ${{ matrix.os }}

      # --- UPLOAD DEBUG SYMBOLS TO SENTRY (optional) ---
      # Runs on both iOS and Android matrix jobs independently.
      # Release lifecycle (new/finalize) is handled by sentry-create-release and
      # sentry-finalize-release jobs to avoid race conditions in this parallel matrix.
      # continue-on-error: true ensures a Sentry upload failure never blocks the release.
      - name: Upload Debug Symbols to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          PLATFORM: ${{ matrix.os }}
        run: |
          # 1. Install Sentry CLI
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION="2.42.2" bash

          # 2. Validate tag version matches pubspec.yaml version (base version only, ignoring -rc* suffix)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAG_VERSION="${TAG_VERSION%%-rc*}"
          PUBSPEC_VERSION=$(awk '/^version:/{split($2,a,"+"); print a[1]; exit}' pubspec.yaml)
          PUBSPEC_VERSION="${PUBSPEC_VERSION%%-rc*}"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::warning::Tag version ($TAG_VERSION) does not match pubspec version ($PUBSPEC_VERSION). Skipping Sentry upload."
            exit 0
          fi
          SENTRY_RELEASE="$PUBSPEC_VERSION"
          echo "Uploading debug symbols for Sentry release: $SENTRY_RELEASE (platform: $PLATFORM)"

          # 3. Upload platform-specific debug symbols
          if [ "$PLATFORM" = "ios" ]; then
            # Upload dSYM files (Native code: Swift, Objective-C, C++)
            # Located in xcarchive created by build_app with archive_path in Fastfile.
            DSYM_DIR="build/ios/archive/Runner.xcarchive/dSYMs"
            if [ -d "$DSYM_DIR" ]; then
              echo "Uploading dSYM files from $DSYM_DIR..."
              sentry-cli debug-files upload --include-sources "$DSYM_DIR"
            else
              echo "::warning::dSYM directory not found at $DSYM_DIR. Skipping dSYM upload."
            fi

            # Upload Dart debug symbols
            # Generated via SPLIT_DEBUG_INFO xcargs in Fastfile's build_app.
            SYMBOLS_DIR="build/ios/outputs/symbols"
            if [ -d "$SYMBOLS_DIR" ]; then
              echo "Uploading Dart debug symbols from $SYMBOLS_DIR..."
              sentry-cli debug-files upload "$SYMBOLS_DIR"
            else
              echo "::warning::Dart symbols directory not found at $SYMBOLS_DIR. Skipping Dart symbols upload."
            fi
          else
            # Upload ProGuard Mapping (Android native de-obfuscation).
            # The Sentry Android Gradle plugin injects a UUID into the app binary at build time
            # and writes it to sentry-debug-meta.properties. We read it here to link the mapping
            # to the correct build, so Sentry can deobfuscate Android stack traces accurately.
            MAPPING_FILE="build/app/outputs/mapping/release/mapping.txt"
            if [ -f "$MAPPING_FILE" ]; then
              echo "Uploading ProGuard mapping from $MAPPING_FILE..."
              SENTRY_META="build/app/intermediates/assets/release/mergeReleaseAssets/sentry-debug-meta.properties"
              if [ -f "$SENTRY_META" ]; then
                PROGUARD_UUID=$(grep "io.sentry.ProguardUuids" "$SENTRY_META" | cut -d= -f2 | tr -d '[:space:]')
                echo "Found ProGuard UUID: $PROGUARD_UUID"
                sentry-cli upload-proguard --uuid "$PROGUARD_UUID" "$MAPPING_FILE"
              else
                echo "::warning::sentry-debug-meta.properties not found. Uploading ProGuard mapping without UUID."
                sentry-cli upload-proguard "$MAPPING_FILE"
              fi
            else
              echo "::warning::mapping.txt not found at $MAPPING_FILE. Skipping ProGuard upload."
            fi

            # Upload Dart debug symbols
            # Generated via --split-debug-info flag in Android Fastfile.
            SYMBOLS_DIR="build/app/outputs/symbols"
            if [ -d "$SYMBOLS_DIR" ]; then
              echo "Uploading Dart debug symbols from $SYMBOLS_DIR..."
              sentry-cli debug-files upload "$SYMBOLS_DIR"
            else
              echo "::warning::Dart symbols directory not found at $SYMBOLS_DIR. Skipping Dart symbols upload."
            fi
          fi

  # --- SENTRY: Finalize release after all platform uploads complete ---
  sentry-finalize-release:
    name: Finalize Sentry Release
    # Run even if some release matrix legs failed — Sentry finalize is optional
    if: always() && startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    environment: prod
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Finalize Sentry Release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION="2.42.2" bash

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAG_VERSION="${TAG_VERSION%%-rc*}"
          PUBSPEC_VERSION=$(awk '/^version:/{split($2,a,"+"); print a[1]; exit}' pubspec.yaml)
          PUBSPEC_VERSION="${PUBSPEC_VERSION%%-rc*}"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::warning::Skipping Sentry finalize — version mismatch."
            exit 0
          fi

          echo "Finalizing Sentry release: $PUBSPEC_VERSION"
          sentry-cli releases finalize "$PUBSPEC_VERSION"
